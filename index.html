<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic From</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
        }

        .container {
            width: 350px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Contcat Form</h2>

    <form action="success.html" method="post">
        <label for="name">Name</label>
        <input id="name" type="text" name="name" placeholder="Enter Name" required>

        <label for="email">Emial</label>
        <input id="email" type="email" name="email" placeholder="Enter Emial" required>

        <label for="phone">Phone</label>
        <input id="phone" type="tel" name="phone" placeholder="Enter Phone Number">

        <label for="message">Mesage</label>
        <textarea id="message" name="message" placeholder="Enter Mesage" required></textarea>

        <button type="submit">Sumbit</button>
    </form>
</div>

</body>
</html>
